name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true

      - name: gofmt
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "These files are not gofmt-clean:"; echo "$fmt"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

      - name: build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: gosec
        # Run gosec through the setup-go toolchain rather than the securego/gosec
        # Docker image, whose bundled Go can lag a release behind go.mod and fail
        # with "go.mod requires go >= ...". Keeps CI == local. G115 (integer
        # overflow on conversion) is excluded as low-signal for our small enum
        # conversions; remaining intentional cases carry //#nosec directives.
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -exclude=G115 ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # update the sticky coverage comment on PRs
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
      - name: Coverage (report + floor)
        id: cov
        run: |
          go test -covermode=atomic -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "pct=$pct" >> "$GITHUB_OUTPUT"
          # Per-package breakdown for the PR comment (tests are cached here).
          # Extract pkg + the % after "coverage:" (field positions vary with
          # ok/cached/time prefixes, so scan fields instead of using $NF).
          {
            echo 'pkgs<<PKGS'
            go test -cover ./... 2>&1 | awk '
              /coverage:/ {
                pkg=""; pct="";
                for (i=1; i<=NF; i++) {
                  if ($i ~ /wigata-intech\/logres/) pkg=$i;
                  if ($i=="coverage:") pct=$(i+1);
                }
                sub(".*/logres/", "", pkg);
                printf "  %-40s %s\n", pkg, pct;
              }'
            echo 'PKGS'
          } >> "$GITHUB_OUTPUT"
          echo "Total coverage: ${pct}%"
          # Conservative regression floor; not a target. It is low because the
          # tree is still mostly generated stubs at 0% — raise it deliberately as
          # packages are implemented.
          awk "BEGIN{exit !($pct>=5)}" || {
            echo "::error::total coverage ${pct}% is below the 5% floor"; exit 1;
          }
      - name: Sticky coverage comment
        if: github.event_name == 'pull_request'
        continue-on-error: true # fork PRs get a read-only token; don't fail CI over a comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          PCT: ${{ steps.cov.outputs.pct }}
          PKGS: ${{ steps.cov.outputs.pkgs }}
        run: |
          marker='<!-- coverage-report -->'
          body="$(printf '%s\n### Test coverage: **%s%%**\n\n<details><summary>per package</summary>\n\n```\n%s\n```\n</details>\n' \
            "$marker" "$PCT" "$PKGS")"
          id=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq "map(select(.body|startswith(\"$marker\")))|.[0].id // empty")
          if [ -n "$id" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$id" -f body="$body" >/dev/null
          else
            gh api "repos/$REPO/issues/$PR/comments" -f body="$body" >/dev/null
          fi
          echo "posted/updated coverage comment on PR #$PR"
